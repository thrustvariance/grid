<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>India Open Gridworks++</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>India Open Gridworks++</h1>
    <div class="controls">
      <input id="search" placeholder="Search assets (plant, tx, mine, LNG...)" />
      <button id="togglePanel">Toggle Panel</button>
    </div>
  </header>

  <main>
    <aside id="panel" class="open">
      <h2>Asset Details</h2>
      <div id="assetContent">Select an asset on the map.</div>
      <hr/>
      <h3>Active Layers</h3>
      <ul id="activeLayers"></ul>
    </aside>
    <section id="map"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
