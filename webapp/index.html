<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>India Open Gridworks++</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>India Open Gridworks++</h1>
        <p class="subtitle">Grid + Supply Chain Intelligence for India</p>
      </div>
      <div class="toolbar">
        <input id="search" placeholder="Search plant, mine, LNG terminal, substation..." />
        <button id="togglePanel">Hide Panel</button>
      </div>
    </header>

    <main class="layout">
      <aside id="panel" class="panel open">
        <section class="card hero">
          <h2>System Snapshot</h2>
          <div class="metrics" id="metrics"></div>
        </section>

        <section class="card">
          <h3>Layer Presets</h3>
          <div id="layerPills" class="pills"></div>
        </section>

        <section class="card">
          <h3>Asset Details</h3>
          <div id="assetContent" class="asset-content">Select an asset on the map.</div>
        </section>

        <section class="card">
          <h3>Active Layers</h3>
          <ul id="activeLayers"></ul>
        </section>
      </aside>

      <section class="map-wrap">
        <div id="map"></div>
        <div class="legend">
          <span><i class="dot plants"></i> Plants</span>
          <span><i class="dot subs"></i> Substations</span>
          <span><i class="dot supply"></i> Supply / Logistics</span>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
